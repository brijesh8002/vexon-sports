<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booked Tours | Vexon Sports</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>


<body>
  <main>



    <!-- HEADER -->
    <header id="header"></header>



<section class="my-bookings py-5">
  <div class="container">

    <!-- EMPTY STATE -->
    <div class="empty-state  text-center" id="emptyState">
      <i class="bi bi-bag-x"></i>
      <h5 class="mt-3">No Bookings Found</h5>
      <p class="text-muted">You haven’t booked any tours yet.</p>
      <a href="allTours.html" class="btn btn-reserve px-4">Explore Tours</a>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="fw-bold mb-0">My Bookings</h3>
      <a href="allTours.html" class="btn btn-dark px-4">Book New Tour</a>
    </div>

    <!-- BOOKING CARD -->
    <div class="booking-card">

      <div class="booking-header">
        <div>
          <h5 class="mb-1">Golden Triangle Tour</h5>
          <small class="text-muted">Order ID: #GTX20260021</small>
        </div>

        <span class="status confirmed">Confirmed</span>
      </div>

      <div class="booking-body row align-items-center">

        <div class="col-md-3">
          <img alt="image"  src="assets/media/hero2.webp" class="img-fluid booking-img" alt="">
        </div>

        <div class="col-md-6">
          <p class="mb-1"><i class="bi bi-geo-alt"></i> Delhi → Agra → Jaipur</p>
          <p class="mb-1"><i class="bi bi-calendar"></i> 12 Oct 2026 - 15 Oct 2026</p>
          <p class="mb-1"><i class="bi bi-people"></i> 2 Travelers</p>
          <p class="mb-0"><i class="bi bi-credit-card"></i> Payment: Paid</p>
        </div>

        <div class="col-md-3 text-md-end">
          <h5 class="price mb-2">$50</h5>

          <div class="d-flex flex-column gap-2">
            <a href="mybookingDetail.html" class="btn btn-outline-dark btn-sm">View Details</a>
            <!-- <button class="btn btn-outline-danger btn-sm">Cancel</button> -->
          </div>
        </div>

      </div>

    </div>

    

  </div>
</section>


    <!-- Footer Start -->
    <footer class="footer" id="footer"></footer>




    <!-- Footer End -->


  </main>




  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/script.js"></script>

</body>

</html>
