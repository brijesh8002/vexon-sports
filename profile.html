<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wishlist | Vexon Sports</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <main>



    <!-- HEADER -->
    <header id="header"></header>

    <section class="py-5">
      <div class="container">

        <div class="up-card row g-0">

          <!-- ================= LEFT PROFILE ================= -->
          <div class="col-lg-4 up-sidebar">

            <img alt="image"  src="assets/media/user.webp" class="up-avatar">

            <div class="up-name">Shiva</div>
            <div class="up-role">Premium Traveler</div>

            <div class="mt-3">
              <span class="up-badge">Verified User</span>
            </div>

            <hr class="bg-light">

            <p class="mb-1"><i class="bi bi-geo-alt"></i> India</p>
            <p class="mb-1"><i class="bi bi-calendar"></i> Joined 2024</p>
          </div>

          <!-- ================= RIGHT DETAILS ================= -->
          <div class="col-lg-8 up-content">

            <h4 class="fw-bold mb-4">User Profile</h4>

            <div class="up-info">
              <span class="up-label">Full Name</span>
              <span class="up-value">Shiva</span>
            </div>

            <div class="up-info">
              <span class="up-label">Email</span>
              <span class="up-value">shiva@email.com</span>
            </div>

            <div class="up-info">
              <span class="up-label">Phone</span>
              <span class="up-value">+91 9876543210</span>
            </div>

            <div class="up-info">
              <span class="up-label">Gender</span>
              <span class="up-value">Male</span>
            </div>

            <div class="up-info">
              <span class="up-label">Total Bookings</span>
              <span class="up-value">5 Trips</span>
            </div>

            <div class="up-info">
              <span class="up-label">Membership</span>
              <span class="up-value text-success">Premium</span>
            </div>

            <div class="mt-4 d-flex gap-2">
              <button class="btn btn-dark up-btn" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                Edit Profile
              </button>
              <button class="btn btn-outline-danger up-btn">Logout</button>
            </div>

          </div>

        </div>

      </div>
    </section>

    <div class="modal fade" id="editProfileModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius:16px; overflow:hidden;">

          <!-- HEADER -->
          <div class="modal-header bg-dark text-white">
            <h5 class="modal-title">Edit Profile</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>

          <!-- BODY -->
          <div class="modal-body p-4">

            <div class="text-center mb-3">
              <img alt="image"  src="https://i.pravatar.cc/120" class="rounded-circle" width="90" height="90">
            </div>

            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="primary-input" value="Rahul Sharma">
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="primary-input" value="rahul@email.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="text" class="primary-input" value="+91 9876543210">
            </div>

            <div class="mb-3">
              <label class="form-label">Gender</label>
              <select class="form-select">
                <option selected>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Upload Photo</label>
              <input type="file" class="primary-input">
            </div>

          </div>

          <!-- FOOTER -->
          <div class="modal-footer">
            <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-dark">Save Changes</button>
          </div>

        </div>
      </div>
    </div>



    <!-- Footer Start -->
    <footer class="footer" id="footer"></footer>




    <!-- Footer End -->


  </main>




  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/script.js"></script>

</body>

</html>
