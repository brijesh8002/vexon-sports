<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Authentication | Vexon Sports</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <main>



    <!-- HEADER -->
    <header id="header"></header>

    <!-- HERO -->









    <div class="auth-wrapper">


    <div class="auth-right ">
        <div class="auth-box">

            <!-- LOGIN -->
            <div id="login">
                <div class="auth-title mb-4">Sign in</div>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input class="primary-input" placeholder="Email address">
                </div>

                <div class="input-group mb-2">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="primary-input" placeholder="Password">
                </div>

                <div class="text-end mb-3">
                    <span class="auth-link" onclick="showForm('forgot')">Forgot password?</span>
                </div>

                <button class="auth-btn w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
                </button>

                <div class="text-center">
                    <span class="text-muted">Don't have an account?</span>
                    <span class="auth-link" onclick="showForm('signup')">Sign up</span>
                </div>
            </div>

            <!-- SIGNUP -->
            <div id="signup" class="hidden">
                <div class="auth-title mb-4">Create account</div>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input class="primary-input" placeholder="Full name">
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input class="primary-input" placeholder="Email address">
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="primary-input" placeholder="Password">
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" class="primary-input" placeholder="Confirm password">
                </div>

                <button class="auth-btn w-100 mb-3">
                    <i class="bi bi-person-plus me-1"></i> Sign up
                </button>

                <div class="text-center">
                    <span class="text-muted">Already have an account?</span>
                    <span class="auth-link" onclick="showForm('login')">Sign in</span>
                </div>
            </div>

            <!-- FORGOT -->
            <div id="forgot" class="hidden">
                <div class="auth-title mb-4">Reset password</div>

                <p class="text-muted small mb-3">
                    Enter your email to receive Otp.
                </p>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input class="primary-input" placeholder="Email address">
                    <input class="btn btn-reserve" type="submit" value="SEND OTP">
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="text" class="primary-input" placeholder="Enter OTP">
                </div>

                <button class="auth-btn w-100 mb-3 " onclick="showForm('resetNew')">
                    <i class="bi bi-send"></i> Submit
                </button>

                <div class="text-center">
                    <span class="auth-link" onclick="showForm('login')">Back to sign in</span>
                </div>
            </div>

            <!-- FORGOT -->
            <div id="resetNew" class="hidden">
                <div class="auth-title mb-4">Reset password</div>

                <p class="text-muted small mb-3">
                    Enter Your New password!
                </p>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input class="primary-input" placeholder="New Password">
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="text" class="primary-input" placeholder="Re-Enter New Password">
                </div>

                <button class="auth-btn w-100 mb-3">
                    <i class="bi bi-send"></i> Send link
                </button>

                <div class="text-center">
                    <span class="auth-link" onclick="showForm('login')">Back to sign in</span>
                </div>
            </div>

        </div>
    </div>

</div>






    <!-- Footer Start -->
    <footer class="footer" id="footer"></footer>




    <!-- Footer End -->


  </main>




  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/script.js"></script>

</body>

</html>
